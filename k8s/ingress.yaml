# Requires an Ingress controller (nginx, traefik, etc.)
# Set the host and TLS secret before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forkit-site
  namespace: forkit
  labels:
    app: forkit-site
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  # Uncomment and fill in for TLS:
  # tls:
  #   - hosts:
  #       - your-forkit-node.example
  #     secretName: forkit-site-tls
  rules:
    - host: your-forkit-node.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forkit-site
                port:
                  number: 3000
