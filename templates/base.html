<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ForkIt — Decentralized Food Delivery on Solana{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}ForkIt — Decentralized Food Delivery on Solana{% endblock %}" />
  <meta property="og:description" content="{{ config.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ config.base_url }}" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ForkIt — Decentralized Food Delivery on Solana" />
  <meta name="twitter:description" content="{{ config.description }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ get_url(path='main.css') }}" />
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  {% include "partials/nav.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <script src="{{ get_url(path='js/main.js') }}"></script>
</body>
</html>
