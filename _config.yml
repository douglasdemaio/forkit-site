title: ForkIt
description: Decentralized Food Delivery Protocol on Solana
url: "https://forkit.sol"
baseurl: ""

# Build settings
theme: null
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO
author: douglasdemaio
twitter:
  card: summary_large_image

# Sass
sass:
  style: compressed
  sass_dir: _sass

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

# Collections (for future docs/blog posts)
collections:
  docs:
    output: true
    permalink: /docs/:name/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
