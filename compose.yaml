# docker compose / podman compose entry point for forkit-site.
#
# Usage:
#   podman compose up --build
#
# Brings up:
#   - db:          Postgres 16 (data persisted in named volume)
#   - forkit-site: Next.js app on :3000 (runs `prisma db push` at startup)
#
# Optional: bring up the Rust MCP server alongside by enabling the
# `mcp-server` profile:
#   podman compose --profile mcp up --build

services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: forkit
      POSTGRES_PASSWORD: forkit
      POSTGRES_DB: forkit
    ports:
      - "5432:5432"
    volumes:
      - forkit-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forkit -d forkit"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  forkit-site:
    build:
      context: .
      args:
        NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}
        NEXT_PUBLIC_SOLANA_NETWORK: ${NEXT_PUBLIC_SOLANA_NETWORK:-devnet}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    # Rootless Podman: map container uid/gid 1001 (nextjs) to host uid/gid 1000
    # so bind-mounted host files (owned by the host user) are writable.
    userns_mode: "keep-id:uid=1001,gid=1001"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env before running}
      DATABASE_URL: postgresql://forkit:forkit@db:5432/forkit?schema=public
      UPLOAD_DIR: /app/public/uploads
      FORKME_URL: ${FORKME_URL:-http://localhost:3001}
    volumes:
      - ./public/uploads:/app/public/uploads:Z
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  forkme-mcp:
    profiles: ["mcp"]
    build:
      context: ./mcp-server
    ports:
      - "3001:3001"
    environment:
      FORKIT_API_URL: http://forkit-site:3000
      FORKIT_JWT_TOKEN: ${FORKIT_JWT_TOKEN:-}
      RUST_LOG: info
    depends_on:
      - forkit-site
    restart: unless-stopped

volumes:
  forkit-pgdata:
