# docker compose / podman compose entry point for forkit-site.
#
# Usage:
#   docker compose up --build
#   podman compose up --build
#
# Optional: bring up the Rust MCP server alongside by enabling the
# `mcp-server` profile:
#   docker compose --profile mcp up --build

services:
  forkit-site:
    build:
      context: .
      args:
        NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}
        NEXT_PUBLIC_SOLANA_NETWORK: ${NEXT_PUBLIC_SOLANA_NETWORK:-devnet}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    # Rootless Podman: map container uid/gid 1001 (nextjs) to host uid/gid 1000
    # so bind-mounted host files (owned by the host user) are writable.
    userns_mode: "keep-id:uid=1001,gid=1001"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env before running}
      # Resolves relative to prisma/schema.prisma → /app/prisma/dev.db (bind-mounted below)
      DATABASE_URL: file:./dev.db
      UPLOAD_DIR: /app/public/uploads
      FORKME_URL: ${FORKME_URL:-http://localhost:3001}
    volumes:
      # Bind-mount host paths so state survives image rebuilds.
      # The DB lives in ./prisma/dev.db on the host (matches the dev workflow);
      # uploads live in ./public/uploads.
      - ./prisma:/app/prisma:Z
      - ./public/uploads:/app/public/uploads:Z
    restart: unless-stopped

  forkme-mcp:
    profiles: ["mcp"]
    build:
      context: ./mcp-server
    ports:
      - "3001:3001"
    environment:
      FORKIT_API_URL: http://forkit-site:3000
      FORKIT_JWT_TOKEN: ${FORKIT_JWT_TOKEN:-}
      RUST_LOG: info
    depends_on:
      - forkit-site
    restart: unless-stopped
