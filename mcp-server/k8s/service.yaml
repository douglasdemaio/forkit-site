apiVersion: v1
kind: Service
metadata:
  name: forkme-mcp
  namespace: forkit
  labels:
    app: forkme-mcp
spec:
  selector:
    app: forkme-mcp
  ports:
    - name: sse
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
---
# Expose externally (remove if using Ingress instead)
apiVersion: v1
kind: Service
metadata:
  name: forkme-mcp-external
  namespace: forkit
  labels:
    app: forkme-mcp
spec:
  selector:
    app: forkme-mcp
  ports:
    - name: sse
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: LoadBalancer
