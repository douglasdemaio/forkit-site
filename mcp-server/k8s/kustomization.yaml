# Apply everything at once:
#   kubectl apply -k mcp-server/k8s/
# Or with kustomize:
#   kustomize build mcp-server/k8s/ | kubectl apply -f -
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forkit

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  # Uncomment to enable external Ingress:
  # - ingress.yaml

# Override image tag for a specific release:
# images:
#   - name: forkme-mcp
#     newTag: v0.1.0
